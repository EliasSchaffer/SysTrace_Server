<!DOCTYPE html>
<html>
<head>
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="header">
    <h1>{{.Heading}}</h1>
</div>

<div class="container">
    <div class="sidebar">
        <h2>Statistics</h2>
        <div>Connected Devices: {{.DeviceCount}}</div>

        <h2>Health Status</h2>
        <div id="healthStatus" style="font-size: 12px; max-height: 300px; overflow-y: auto;">
        </div>

        <h2>Live Data</h2>
        <div>{{.Data}}</div>
    </div>

    <div class="main-content">
        <div id="map"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
