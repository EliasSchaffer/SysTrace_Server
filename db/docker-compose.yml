version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: systrace_postgres
    environment:
      POSTGRES_USER: systrace
      POSTGRES_PASSWORD: systrace_secure_password
      POSTGRES_DB: systrace_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - systrace_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systrace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  systrace_network:
    driver: bridge

